spring:
  config:
    activate:
      on-profile: docker

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration

  jpa:
    open-in-view: false
    show-sql: false  # 부하테스트 시 false로 변경 (성능 향상)
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false  # 부하테스트 시 false로 변경
        jdbc.lob.non_contextual_creation: true
        jdbc.time_zone: UTC
        connection.provider_disables_autocommit: true
        # 배치 처리 최적화 추가
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
        jdbc.batch_versioned_data: true

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      maximum-pool-size: 100  # 500에서 100으로 줄임 (로컬 환경)
      minimum-idle: 20
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 1200000
      # 추가 최적화
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1

  # Redis 설정 최적화
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
          max-wait: 3000ms

  # Docker 환경 메일 설정
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # 기존 OAuth2 설정 유지...
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope:
              - email
              - profile

  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics  # metrics 추가
    health:
      elasticsearch:
        enabled: false

# 서버 설정 대폭 개선
server:
  tomcat:
    # 연결 설정
    max-connections: 8192      # 최대 연결 수
    accept-count: 1000         # 대기 큐 크기
    # 스레드 설정
    threads:
      max: 1000               # 최대 스레드 (기존 max-threads를 threads.max로 변경)
      min-spare: 100          # 최소 유지 스레드
    # Keep-Alive 설정
    keep-alive-timeout: 20s
    max-keep-alive-requests: 100
    # 타임아웃 설정
    connection-timeout: 20s
    # 압축 설정
    compression: on
    compressible-mime-types: application/json,text/plain
  # HTTP/2 활성화 (성능 향상)
  http2:
    enabled: true
  port: 8080

# 로깅 최적화 (부하테스트용)
logging:
  level:
    root: WARN                    # INFO에서 WARN으로 변경
    com.unear: INFO               # DEBUG에서 INFO로 변경
    org.springframework.web.cors: WARN
    org.springframework.security.web: WARN
    org.springframework.web.filter.CorsFilter: WARN
    org.springframework.security.web.access: WARN
    org.springframework.security.web.FilterChainProxy: WARN
    org.hibernate.SQL: WARN       # SQL 로그 비활성화
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs

internal:
  key: ${INTERNAL_KEY}