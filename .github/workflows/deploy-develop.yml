name: Deploy to AWS

on:
  push:
    branches: [ develop ]  # develop 브랜치 푸시 시 트리거
  workflow_dispatch:       # 수동 트리거도 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 코드 체크아웃
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Docker Buildx 설정
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 3. Docker Hub 로그인
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4. Docker 이미지 빌드 및 푸시
    - name: Build and Push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: 1seyoung/unear-app:develop

    # 5. AWS 자격증명 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-2

    # 5. CodeDeploy 배포 실행 (기존 S3 패키지 사용)
    - name: Create CodeDeploy deployment
      run: |
        aws deploy create-deployment \
          --application-name unear-app-deploy \
          --deployment-group-name unear-app-group \
          --s3-location bucket=unear-deploy-bucket,key=deploy-package.zip,bundleType=zip \
          --description "Automated deployment from GitHub Actions - Commit: ${{ github.sha }}"

    # 6. 배포 상태 확인 (선택사항)
    - name: Check deployment status
      run: |
        echo "Deployment triggered successfully!"
        echo "Check AWS CodeDeploy console for deployment progress."
        echo "Commit SHA: ${{ github.sha }}"
